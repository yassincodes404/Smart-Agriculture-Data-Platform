server {

    listen 80;
    server_name localhost;

    # ───────────────────────────────────────────
    # Development Content Security Policy
    # Allows 'unsafe-eval' and 'unsafe-inline' which are required for:
    # - Vite HMR / dev server
    # - React Fast Refresh
    # - Recharts / Leaflet internals (they use new Function / eval in dev)
    #
    # For production build, tighten this (remove unsafe-eval).
    # ───────────────────────────────────────────
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' http: https:; style-src 'self' 'unsafe-inline' https:; img-src 'self' data: blob: https:; connect-src 'self' ws: wss: http: https:; font-src 'self' https:; object-src 'none'; base-uri 'self'; frame-ancestors 'none';" always;

    # ───────────────────────────────────────────
    # Backend API — proxy to FastAPI (port 8000)
    # ───────────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # ───────────────────────────────────────────
    # Vite HMR WebSocket — required for hot reload
    # ───────────────────────────────────────────
    location /__vite_hmr {
        proxy_pass         http://frontend:5173;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 86400s;
    }

    # ───────────────────────────────────────────
    # Frontend — proxy to Vite dev server (port 5173)
    # ───────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:5173/;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
    }

}