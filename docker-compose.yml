
services:

  postgres:
    build: ./Database
    container_name: agri_postgres
    restart: always
    env_file:
      - .env.db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./Database/init.sql:/docker-entrypoint-initdb.d/00_init.sql
      - ./Database/seed.sql:/docker-entrypoint-initdb.d/20_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agri_user -d agriculture"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build: ./services/backend
    container_name: agri_backend
    env_file:
      - .env.backend
    volumes:
      - ./services/backend/app:/app/app
      - ${DATA_DIR:-./data}:/data
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  scheduler:
    build: ./services/backend
    container_name: agri_scheduler
    env_file:
      - .env.backend
    command: ["python", "-m", "app.scheduler.runner"]
    volumes:
      - ./services/backend/app:/app/app
      - ${DATA_DIR:-./data}:/data
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure

  frontend:
    build: ./services/frontend/web
    container_name: agri_frontend
    environment:
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - VITE_API_URL=http://backend:8000
    volumes:
      - ./services/frontend/web:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - backend

  nginx:
    build: ./infra/nginx
    container_name: agri_nginx
    ports:
      - "80:80"
    depends_on:
      - backend
      - frontend

volumes:
  postgres_data:
