# ============================================================
#  Smart Agriculture Data Platform — Docker Compose
#  Services: Python ingestion + Jupyter Notebook
# ============================================================

services:
  # ── Python Ingestion Pipeline ──────────────────────────────
  ingestion:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agri-ingestion
    volumes:
      - ./src:/app/src
      - ./data:/app/data
    env_file: .env
    restart: "no"
    networks:
      - agri-net

  # ── Jupyter Notebook ───────────────────────────────────────
  jupyter:
    image: jupyter/scipy-notebook:latest
    container_name: agri-jupyter
    ports:
      - "${JUPYTER_PORT:-8888}:8888"
    environment:
      JUPYTER_ENABLE_LAB: "yes"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./data:/home/jovyan/data
      - ./src:/home/jovyan/src:ro
    networks:
      - agri-net
    restart: unless-stopped

networks:
  agri-net:
    driver: bridge
